# ============================================================
# Geometry-Aware Deepfake Generation via 3D-Guided Disentanglement
# Training Configuration — Optimised for 1x H100 80GB
# ============================================================

experiment:
  name: "geo_faceswap_sdxl_h100"
  output_dir: "/home/face_swap_3d/outputs/"
  seed: 42
  resume_from_checkpoint: null

# ── Data ────────────────────────────────────────────────────
data:
  datasets:
    - name: CelebA
      root: "/home/face_swap_3d/DECA/data/celeba"
      split: train
      num_samples: 202599
  image_size: 512
  num_workers: 8
  prefetch_factor: 2
  pin_memory: true

# ── Model ───────────────────────────────────────────────────
model:
  # Stable Diffusion XL backbone
  sdxl_model_id: "stabilityai/stable-diffusion-xl-base-1.0"
  vae_model_id: "madebyollin/sdxl-vae-fp16-fix"

  # ArcFace for identity encoding + loss
  arcface_model_path: "/home/face_swap_3d/DECA/pretrained/arcface_r100.onnx"

  # DECA 3D face reconstruction
  deca_model_path: "/home/face_swap_3d/DECA/data/deca_model.tar"
  deca_cfg_path: "/home/face_swap_3d/DECA/configs/release_version/deca_coarse.yml"

  # CLIP (text conditioning)
  clip_model_id: "openai/clip-vit-large-patch14"

  # Region encoder
  region_encoder:
    backbone: "resnet50"
    hidden_dim: 2048
    projection_dim: 512
    num_transformer_layers: 2
    num_heads: 8
    freeze_backbone: true
    in_channels: 7
    regions:
      - eyes
      - nose
      - mouth
      - ears
    pretrained_weights:
      eyes:  "/home/face_swap_3d/eyes_best.pt"
      nose:  "/home/face_swap_3d/nose_best.pt"
      mouth: "/home/face_swap_3d/mouth_best.pt"
      ears:  "/home/face_swap_3d/ears_best.pt"

  # Cross-attention injection (IP-Adapter style)
  cross_attention:
    num_tokens: 4
    scale: 1.0

  # ControlNet for geometry conditioning
  controlnet:
    conditioning_channels: 6   # target depth(3) + target normal(3)
    block_out_channels: [320, 640, 1280, 1280]

  # PatchGAN discriminator
  discriminator:
    ndf: 64
    n_layers: 3
    use_spectral_norm: true

# ── Training (H100 80GB optimised) ──────────────────────────
training:
  total_steps: 10000
  batch_size: 12              # H100 has 80GB — can handle larger batches
  gradient_accumulation_steps: 3   # effective batch = 36
  mixed_precision: "bf16"     # H100 has native bf16 support — faster than fp16
  gradient_checkpointing: true

  optimizer:
    encoder_lr: 1.0e-4
    discriminator_lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 1.0e-2
    eps: 1.0e-8

  scheduler:
    type: "cosine_with_restarts"
    warmup_steps: 500
    num_cycles: 1

  ema:
    enabled: false
    decay: 0.9999
    update_every: 10

  noise_scheduler:
    type: "DDPM"
    num_train_timesteps: 1000
    beta_start: 0.00085
    beta_end: 0.012
    beta_schedule: "scaled_linear"
    prediction_type: "epsilon"

  # Checkpoint / logging
  save_every_steps: 1000
  validate_every_steps: 500
  log_every_steps: 50
  keep_last_n_checkpoints: 3

  # Hardware
  accelerator: "cuda"
  num_gpus: 1

# ── Losses ──────────────────────────────────────────────────
losses:
  identity:
    weight: 1.0
    type: "arcface_cosine"
  perceptual:
    weight: 0.1
    type: "vgg19"
    layers: ["relu1_1", "relu2_1", "relu3_1", "relu4_1", "relu5_1"]
  pixel_reconstruction:
    weight: 1.0
    type: "l1"
  adversarial:
    weight: 0.01
    type: "hinge"
  geometry_consistency:
    weight: 0.5
    type: "landmark_3d"

# ── Evaluation / Metrics ────────────────────────────────────
evaluation:
  fid:
    num_samples: 10000
    inception_model: "pretrained/inception_v3.pth"
  ssim:
    data_range: 1.0
  psnr:
    data_range: 1.0
  arcface_similarity:
    threshold: 0.5
  landmark_3d_error:
    num_landmarks: 68

# ── Inference ───────────────────────────────────────────────
inference:
  num_inference_steps: 50
  guidance_scale: 7.5
  output_size: [512, 512]
  blend_alpha: 0.95
  color_correction: true
