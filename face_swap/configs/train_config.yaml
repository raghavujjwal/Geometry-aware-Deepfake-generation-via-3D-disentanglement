# ============================================================
# Geometry-Aware Deepfake Generation via 3D-Guided Disentanglement
# Training Configuration
# ============================================================

experiment:
  name: "geo_faceswap_sdxl"
  output_dir: "outputs/"
  seed: 42
  resume_from_checkpoint: null         # path to checkpoint dir, or null

# ── Data ────────────────────────────────────────────────────
data:
  datasets:
    - name: CelebA
      root: "data/celeba"
      split: train
      num_samples: 10000          # subset of full 202k — change to taste
                                  #   5000  → fast experiment, ~100 MB
                                  #  10000  → recommended for 10k steps,  ~200 MB
                                  #  50000  → fuller diversity,            ~1 GB
                                  # null    → use entire dataset,          ~4 GB
  image_size: 256
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

# ── Model ───────────────────────────────────────────────────
model:
  # Stable Diffusion XL backbone
  sdxl_model_id: "stabilityai/stable-diffusion-xl-base-1.0"   # TODO: set path/HF id
  vae_model_id: "madebyollin/sdxl-vae-fp16-fix"               # TODO: set path/HF id

  # ArcFace for identity encoding + loss
  arcface_model_path: "pretrained/arcface_r100.onnx"

  # DECA 3D face reconstruction
  deca_model_path: "data/deca_model.tar"
  deca_cfg_path: "configs/release_version/deca_coarse.yml"

  # CLIP (text conditioning)
  clip_model_id: "openai/clip-vit-large-patch14"               # TODO: set path/HF id

  # Region encoder (ResNet-50 + Transformer per region)
  region_encoder:
    backbone: "resnet50"
    hidden_dim: 2048
    projection_dim: 512
    num_transformer_layers: 2
    num_heads: 8
    freeze_backbone: true
    in_channels: 7                         # RGB(3) + normal(3) + depth(1)
    regions:
      - eyes
      - nose
      - mouth
      - ears

    # Pre-trained encoder weights (from similarity pre-training on VGGFace2)
    # Set each to the .pth / .pt file for that region, or null to use ImageNet init.
    pretrained_weights:
      eyes:  null
      nose:  null
      mouth: null
      ears:  null

  # Cross-attention injection (IP-Adapter style)
  cross_attention:
    num_tokens: 4              # tokens per region
    scale: 1.0

  # ControlNet for geometry conditioning
  controlnet:
    conditioning_channels: 6   # target depth(3) + target normal(3)
    internal_channels: 128     # lightweight backbone width (SDXL output channels fixed: 320/640/1280)

  # PatchGAN discriminator
  discriminator:
    ndf: 64
    n_layers: 3
    use_spectral_norm: true

# ── Training ────────────────────────────────────────────────
training:
  total_steps: 10000            # 10k optimizer steps × 2 accum = 20k batch passes (~10 hrs on H100)
  batch_size: 4
  gradient_accumulation_steps: 2      # effective batch = 8
  mixed_precision: "fp16"             # fp16 | bf16 | no  (T4 uses fp16; H100 prefers bf16)
  gradient_checkpointing: true

  optimizer:
    # U-Net is frozen; only cross-attn injection + region encoders + ControlNet are trained
    encoder_lr: 1.0e-4                   # LR for all trainable generator components
    discriminator_lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 1.0e-2
    eps: 1.0e-8

  scheduler:
    type: "cosine_with_restarts"      # cosine_with_restarts | linear | constant
    warmup_steps: 500
    num_cycles: 1

  # EMA — disabled (U-Net is frozen, no need for EMA on backbone)
  ema:
    enabled: false
    decay: 0.9999
    update_every: 10

  # Diffusion noise schedule
  noise_scheduler:
    type: "DDPM"
    num_train_timesteps: 1000
    beta_start: 0.00085
    beta_end: 0.012
    beta_schedule: "scaled_linear"
    prediction_type: "epsilon"        # epsilon | v_prediction

  # Checkpoint / logging
  save_every_steps: 100
  validate_every_steps: 500
  log_every_steps: 50
  keep_last_n_checkpoints: 3

  # Hardware
  accelerator: "cuda"                 # cuda | cpu
  num_gpus: 1                         # 1 x T4 on Kaggle (SDXL too large for 2-GPU DDP)

# ── Losses ──────────────────────────────────────────────────
losses:
  identity:
    weight: 1.0
    type: "arcface_cosine"

  perceptual:
    weight: 0.1
    type: "vgg19"
    layers: ["relu1_1", "relu2_1", "relu3_1", "relu4_1", "relu5_1"]

  pixel_reconstruction:
    weight: 1.0
    type: "l1"

  adversarial:
    weight: 0.01
    type: "hinge"

  geometry_consistency:
    weight: 0.0                        # disabled for scaled-down run (saves compute)
    type: "landmark_3d"

# ── Evaluation / Metrics ────────────────────────────────────
evaluation:
  fid:
    num_samples: 10000
    inception_model: "pretrained/inception_v3.pth"             # TODO: set path
  ssim:
    data_range: 1.0
  psnr:
    data_range: 1.0
  arcface_similarity:
    threshold: 0.5
  landmark_3d_error:
    num_landmarks: 68

# ── Inference ───────────────────────────────────────────────
inference:
  num_inference_steps: 50
  guidance_scale: 7.5
  output_size: [512, 512]
  blend_alpha: 0.95              # face region blending weight
  color_correction: true
